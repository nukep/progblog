---
layout: default
---

<h3>Posts:</h3>
<ul id="posts">

	{% for post in site.posts %}

    <li class="post">
		<span class="date">{{ post.date | date_to_string }}</span>
		&raquo;
		<a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
    </li>

	{% endfor %}

</ul>

<h3>Other links:</h3>
<ul>
	<li>
		<a href="https://nukep.github.io/portfolio/" class="portfolio">My portfolio</a>
	</li>
</ul>
