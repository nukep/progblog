{% capture include_toc %}{{ page.include_toc }}{% endcapture %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title>
    <meta charset="utf-8" />
    <!-- On mobile devices, the viewport should fit snugly with the screen-->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="og:url" content="https://nukep.github.io/progblog{{ page.url }}" />
    <link href='//fonts.googleapis.com/css?family=Lora:400,400italic,700' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" href="{{ "/pygments/darkly.css" | prepend:site.baseurl }}">
    <link rel="stylesheet" href="{{ "/css/main.css" | prepend:site.baseurl }}">
    <script src="{{ "/js/jquery-2.1.3.min.js" | prepend:site.baseurl }}"></script>
    {% if include_toc == 'true' %}
    <script src="{{ "/js/jekyll-table-of-contents/toc.js" | prepend:site.baseurl }}"></script>
    <script>
    $(function() {
        $('#toc').toc({ minimumHeaders: 1, showSpeed: 0, headers: 'h1, h2' });
    });
    </script>
    {% endif %}
</head>

<body>
    {% include header.html %}
    <div id="container">
        <div id="content">
            <h1>{{ page.title }}</h1>
            <h2>{{ page.date | date: '%B %d, %Y' }}</h2>
            <div id="toc"></div>
            {{ content }}
        </div>
{% if site.enable_disqus %}
        <div id="disqus_thread"></div>

<script type="text/javascript">
    /* * * CONFIGURATION VARIABLES * * */
    var disqus_shortname = 'dansprogblog';

    /* * * DON'T EDIT BELOW THIS LINE * * */
    (function() {
        var dsq = document.createElement('script'); dsq.type = 'text/javascript'; dsq.async = true;
        dsq.src = '//' + disqus_shortname + '.disqus.com/embed.js';
        (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(dsq);
    })();
</script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a></noscript>
{% endif %}
    </div>
    <div id="bottom-post">
    </div>
</body>

</html>
